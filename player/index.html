<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <title>Apple Music (open-source player by achen1296)</title>
    <link href="css/player.css" rel="stylesheet" />
  </head>
  <body>
    <div id="player">
      <audio id="currentAudio" preload="auto" autoplay></audio>
      <button id="skipPreviousButton" class="topBarButton">⏮</button>
      <button id="playPauseButton" class="topBarButton">⏯</button>
      <button id="skipNextButton" class="topBarButton">⏭</button>
      <input
        id="playTimeSlider"
        type="range"
        min="0:00"
        max="1:00"
        value="0:00"
        step="any"
        class="slider"
      />
      <div id="playTimeText">0:00</div>
      <input
        id="volumeSlider"
        type="range"
        min="0"
        max="100"
        value="100"
        step="1"
        class="slider"
      />
      <div id="volumeText">100%</div>
      <input
        id="playRateSlider"
        type="range"
        min="0"
        max="2"
        value="1"
        step="0.1"
        class="slider"
      />
      <div id="playRateText">1.0x speed</div>
    </div>
    <div id="albums">
      <h1>Albums</h1>
      <ul id="albumList">
        <li>Loading...</li>
      </ul>
    </div>
    <div id="playlists"></div>
    <h1>Playlists</h1>
    <ul id="playlistList">
      <li>Loading...</li>
    </ul>
  </body>
  <script src="./renderer.js"></script>
</html>
