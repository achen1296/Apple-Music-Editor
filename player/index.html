<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <title>Apple Music (open-source player by achen1296)</title>
  </head>
  <body>
    <div id="player">
      <audio id="currentAudio" preload="auto" autoplay></audio>
      <input
        id="playTimeSlider"
        type="range"
        min="0:00"
        max="1:00"
        value="0:00"
        step="any"
        class="slider"
      />
      <div id="playTimeText">0:00</div>
      <button id="skipPreviousButton">⏮</button>
      <button id="playPauseButton">⏯</button>
      <button id="skipNextButton">⏭</button>
      <input
        id="volumeSlider"
        type="range"
        min="0"
        max="100"
        value="100"
        step="1"
        class="slider"
      />
      <div id="volumeText">100%</div>
    </div>
      <input
        id="playRateSlider"
        type="range"
        min="0"
        max="2"
        value="1"
        step="0.1"
        class="slider"
      />
      <div id="playRateText">1x speed</div>
    </div>
  </body>
  <script src="./renderer.js"></script>
</html>
